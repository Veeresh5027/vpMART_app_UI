<div class="login-container">
    <h2>Login to VPMart</h2>

    <form (ngSubmit)="onLogin()">
        <!-- Email Field -->
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" [(ngModel)]="customer.email" name="email" required>
        </div>

        <!-- Password Field -->
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" [(ngModel)]="customer.pwd" name="password" required>
        </div>

        <!-- Error Message -->
        <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

        <!-- Login Button -->
        <button type="submit" class="login-btn">Login</button>
    </form>
    <p>Don't have an account? <a [routerLink]="['/register']">Register here</a></p>
    <p><a routerLink="/forgot-password">Forgot Password?</a></p>


</div>
