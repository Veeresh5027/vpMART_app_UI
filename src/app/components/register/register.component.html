<div class="login-container">
    <h2>Register for VPMart</h2>

    <form (ngSubmit)="onRegister()">
        <!-- Name Field -->
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" [(ngModel)]="registerRequest.name" name="name" required>
        </div>

        <!-- Email Field -->
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" [(ngModel)]="registerRequest.email" name="email" required>
        </div>

        <!-- Phone Number Field -->
        <div class="form-group">
            <label for="phoneNo">Phone Number:</label>
            <input type="text" id="phoneNo" [(ngModel)]="registerRequest.phoneNo" name="phoneNo" required>
        </div>

        <!-- Error Message -->
        <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

        <!-- Register Button -->
        <button type="submit" class="login-btn">Register</button>
    </form>
</div>
