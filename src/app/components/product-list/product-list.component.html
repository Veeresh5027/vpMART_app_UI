<div class="main-content">
    <div class="section-content section-content-p30">
        <div class="container-fluid">
            <div class="row">
                <!-- If Products are Available -->
                <div *ngIf="products && products.length > 0" class="col-12">
                    <div class="row">
                        <div *ngFor="let tempProduct of products" class="col-md-3 col-sm-6 col-12 mb-4">
                            <div class="product-box">
                                <img [src]="tempProduct.imageUrl" class="img-responsive" alt="{{ tempProduct.name }}">
                                <h1>{{ tempProduct.name }}</h1>
                                <div class="price">₹{{ tempProduct.unitPrice }}</div>
                                <a (click)="addToCart(tempProduct)" class="primary-btn">Add to Cart</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- If No Products Available -->
                <div *ngIf="products && products.length === 0" class="col-12 text-center">
                    <div class="alert alert-danger">
                        No Products Available
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
