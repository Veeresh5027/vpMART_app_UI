<div class="reset-password-container">
    <h2>Reset Password</h2>
    
    <form (ngSubmit)="onResetPassword()">
      <div>
        <label>Email</label>
        <input type="email" [(ngModel)]="resetRequest.email" name="email" readonly />
      </div>
  
      <div>
        <label>Old Password</label>
        <input type="password" [(ngModel)]="resetRequest.oldPwd" name="oldPwd" required />
      </div>
  
      <div>
        <label>New Password</label>
        <input type="password" [(ngModel)]="resetRequest.newPwd" name="newPwd" required />
      </div>
  
      <div>
        <label>Confirm Password</label>
        <input type="password" [(ngModel)]="resetRequest.confirmPwd" name="confirmPwd" required />
      </div>
  
      <button type="submit">Reset Password</button>
    </form>
  
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
  </div>
